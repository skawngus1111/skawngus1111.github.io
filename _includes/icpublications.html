<div class="row g-5 mb-5">
    <div>
      <h3 class="fw-bold border-bottom pb-3 mb-5">International Conference Publications</h3>
      {% if page.title == "Home" %}
        {% for item in site.data.icpublications.featured %}
          <p><a>{{ item.name }}</a></p>
        {% endfor %}
      {% else %}
        {% for item in site.data.icpublications.index %}
          <p><a>{{ item.name }}</a></p>
        {% endfor %}
      {% endif %}
    </div>
  </div>
